citations:
- name: cisegmentation
  doi: https://github.com/Cellular-Imaging-Amsterdam-UMC/cisegmentation
  license: MIT
  description: GPU-enabled OME-Zarr instance segmentation with Cellpose, StarDist, InstanSeg, and Spotiflow.
docker_image:
  org: cellularimagingcf
  name: w_cisegmentation
  tag: v0.3.0
  platform: linux/amd64
algorithm_folder_name: cisegmentation_inference
exec_function:
  name: generate_cli_command
  cli_command: python wrapper.py
  hidden_args:
  - cli_tag: --local
    value: "true"
    append_value: false
    cli_order: 3
inputs:
- name: infolder
  type: image
  label: Input OME-Zarrs
  description: Folder containing regular or HCS OME-Zarr inputs.
  cli_tag: --infolder
  cli_order: 1
  default: directory
  optional: false
  format: [zarr]
  unique_string: [.ome.zarr]
  folder_name: /data/in
  file_count: multiple
  section_id: inputs
  mode: beginner
  subtype: [grayscale, color]
  depth: true
  timepoints: true
  tiled: true
  pyramidal: true
outputs:
- name: outfolder
  type: image
  label: Segmentation Outputs
  description: Folder receiving labeled OME-Zarrs, including one multichannel OME-Zarr gallery in benchmark mode.
  cli_tag: --outfolder
  cli_order: 2
  default: directory
  optional: false
  format: [zarr]
  unique_string: [.ome.zarr]
  folder_name: /data/out
  file_count: multiple
  section_id: outputs
  mode: beginner
  subtype: [label]
  depth: true
  timepoints: true
  tiled: true
  pyramidal: true
display_only: []
parameters:
- name: cell_model
  type: dropdown
  label: "Step 1: Cell Detection"
  description: Skip Step 1, segment cells directly with one model, or segment nuclei with the selected model and expand them into cells.
  options: [{label: Skip, value: skip}, {label: Cellpose 3 cyto3, value: 'cellpose3:cyto3'}, {label: Cellpose-SAM v2, value: 'cellpose-sam:cpsam_v2'}, {label: Cellpose-SAM original, value: 'cellpose-sam:cpsam'}, {label: InstanSeg fluorescence nuclei and cells, value: 'instanseg:fluorescence_nuclei_and_cells'}, {label: Cell expansion using Cellpose 3 nuclei, value: 'expand:cellpose3:nuclei'}, {label: Cell expansion using Cellpose-SAM v2, value: 'expand:cellpose-sam:cpsam_v2'}, {label: Cell expansion using Cellpose-SAM original, value: 'expand:cellpose-sam:cpsam'}, {label: Cell expansion using StarDist nuclei versatile, value: 'expand:stardist:SD_Nuclei_Versatile'}, {label: Cell expansion using InstanSeg single-channel nuclei, value: 'expand:instanseg:single_channel_nuclei'}]
  default: 'cellpose3:cyto3'
  cli_tag: --cell-model
  cli_order: 10
  optional: true
  section_id: essential
  mode: beginner
- {name: cell_channel, type: integer, label: Step 1 Cyto Channel, description: One-based cell/cytoplasm channel for direct segmentation. Cell expansion uses this only when Step 1 Nucleus Channel is 0., default: 1, minimum: 1, cli_tag: --cell-channel, cli_order: 11, optional: true, section_id: essential, mode: beginner}
- {name: cell_nuclei_channel, type: integer, label: Step 1 Nucleus Channel, description: One-based nucleus input supplied as the second channel to direct cell models and used as the nucleus seed channel for cell expansion. Use 0 to omit the second direct-model input or make expansion fall back to the Cyto Channel., default: 0, minimum: 0, cli_tag: --cell-nuclei-channel, cli_order: 12, optional: true, section_id: essential, mode: beginner}
- {name: cell_expansion_distance, type: float, label: Step 1 Expansion Distance (µm), description: Maximum XY distance in µm to expand each nucleus into a cell using a fast Euclidean nearest-label transform., default: 10.0, minimum: 0.0, cli_tag: --cell-expansion-distance, cli_order: 17, optional: true, section_id: essential, mode: beginner}
- name: nucleus_model
  type: dropdown
  label: "Step 2: Nuclei Detection"
  description: Skip Step 2 or select a model for independent nuclei detection and cell/nucleus matching.
  options: [{label: Skip, value: skip}, {label: Cellpose 3 nuclei, value: 'cellpose3:nuclei'}, {label: Cellpose-SAM v2, value: 'cellpose-sam:cpsam_v2'}, {label: Cellpose-SAM original, value: 'cellpose-sam:cpsam'}, {label: StarDist nuclei versatile, value: 'stardist:SD_Nuclei_Versatile'}, {label: InstanSeg single-channel nuclei, value: 'instanseg:single_channel_nuclei'}, {label: InstanSeg fluorescence nuclei and cells, value: 'instanseg:fluorescence_nuclei_and_cells'}]
  default: skip
  cli_tag: --nucleus-model
  cli_order: 21
  optional: true
  section_id: essential
  mode: beginner
- {name: nucleus_channel, type: integer, label: Step 2 Nucleus Channel, description: One-based signal channel used for independent nuclei detection., default: 1, minimum: 1, cli_tag: --nucleus-channel, cli_order: 22, optional: true, section_id: essential, mode: beginner}
- name: foci_model_1
  type: dropdown
  label: "Step 3a: Foci Detection"
  description: Skip this slot or select a Spotiflow, StarDist SD_Foci, or Cellpose 3 bacteria model.
  options: &foci_model_options [{label: Skip, value: skip}, {label: Spotiflow general, value: 'spotiflow:general'}, {label: Spotiflow HYBISS, value: 'spotiflow:hybiss'}, {label: Spotiflow synthetic complex, value: 'spotiflow:synth_complex'}, {label: Spotiflow synthetic 3D, value: 'spotiflow:synth_3d'}, {label: Spotiflow smFISH 3D, value: 'spotiflow:smfish_3d'}, {label: Spotiflow fluorescence live, value: 'spotiflow:fluo_live'}, {label: StarDist foci aggregates, value: 'stardist:SD_Foci_Aggregates'}, {label: StarDist foci Finn, value: 'stardist:SD_Foci_Finn'}, {label: Cellpose 3 bacteria phase, value: 'cellpose3:bact_phase_cp3'}, {label: Cellpose 3 bacteria fluorescence, value: 'cellpose3:bact_fluor_cp3'}]
  default: skip
  cli_tag: --foci-model-1
  cli_order: 31
  optional: true
  section_id: essential
  mode: beginner
- {name: foci_channel_1, type: integer, label: Step 3a Channel, description: One-based input channel for Step 3a., default: 1, minimum: 1, cli_tag: --foci-channel-1, cli_order: 32, optional: true, section_id: essential, mode: beginner}
- {name: foci_model_2, type: dropdown, label: "Step 3b: Foci Detection", description: Skip this slot or select a foci/bacteria model., options: *foci_model_options, default: skip, cli_tag: --foci-model-2, cli_order: 34, optional: true, section_id: essential, mode: beginner}
- {name: foci_channel_2, type: integer, label: Step 3b Channel, description: One-based input channel for Step 3b., default: 1, minimum: 1, cli_tag: --foci-channel-2, cli_order: 35, optional: true, section_id: essential, mode: beginner}
- {name: foci_model_3, type: dropdown, label: "Step 3c: Foci Detection", description: Skip this slot or select a foci/bacteria model., options: *foci_model_options, default: skip, cli_tag: --foci-model-3, cli_order: 37, optional: true, section_id: essential, mode: beginner}
- {name: foci_channel_3, type: integer, label: Step 3c Channel, description: One-based input channel for Step 3c., default: 1, minimum: 1, cli_tag: --foci-channel-3, cli_order: 38, optional: true, section_id: essential, mode: beginner}
- {name: foci_model_4, type: dropdown, label: "Step 3d: Foci Detection", description: Skip this slot or select a foci/bacteria model., options: *foci_model_options, default: skip, cli_tag: --foci-model-4, cli_order: 40, optional: true, section_id: essential, mode: beginner}
- {name: foci_channel_4, type: integer, label: Step 3d Channel, description: One-based input channel for Step 3d., default: 1, minimum: 1, cli_tag: --foci-channel-4, cli_order: 41, optional: true, section_id: essential, mode: beginner}
- {name: remove_border_cells, type: checkbox, label: Remove Border Cells, description: Remove cells touching an XY image border and their matched nucleus and cytoplasm labels., default: true, cli_tag: --remove-border-cells, cli_order: 43, optional: true, append_value: true, section_id: essential, mode: beginner}
- {name: include_original_channels, type: checkbox, label: Include Original Data Channels, description: Prepend all original channels to the int32 output. Integer data is copied losslessly; finite in-range floating-point data is rounded to the nearest integer. Label values remain unchanged., default: false, cli_tag: --include-original-channels, cli_order: 42, optional: true, append_value: true, section_id: essential, mode: beginner}
- name: device
  type: dropdown
  label: Compute Device
  description: Auto uses CUDA when available.
  options: [{label: Auto, value: auto}, {label: CUDA, value: cuda}, {label: CPU, value: cpu}]
  default: auto
  multiselect: false
  cli_tag: --device
  cli_order: 15
  optional: true
  section_id: advanced
  mode: advanced
- {name: write_ome_zarr_labels, type: checkbox, label: Write Native OME-Zarr Labels, description: Write the original image at the output root and each segmentation as an OME-Zarr 0.4 image-label under the labels group instead of appending label channels., default: false, cli_tag: --write-ome-zarr-labels, cli_order: 45, optional: true, append_value: true, section_id: advanced, mode: advanced}
- {name: labels_log_info, type: checkbox, label: Labels Log Info, description: Calculate and log label counts, foreground fraction, and label size statistics. Disabled by default to avoid scanning large label arrays after segmentation., default: false, cli_tag: --labels-log-info, cli_order: 46, optional: true, append_value: true, section_id: advanced, mode: advanced}
- name: dimension_mode
  type: dropdown
  label: Dimension Mode
  description: Auto uses native 3D for supported models and slice-wise 2D otherwise.
  options: [{label: Auto, value: auto}, {label: Force slice-wise 2D, value: slice-2d}]
  default: auto
  multiselect: false
  cli_tag: --dimension-mode
  cli_order: 16
  optional: true
  section_id: advanced
  mode: advanced
- {name: diameter, type: float, label: Cellpose Diameter (µm), description: Expected object diameter in µm, converted using OME-Zarr XY pixel size. 0 uses 12 µm for nuclei or 25 µm for cells; -1 uses the model default., default: 0.0, minimum: -1.0, cli_tag: --diameter, cli_order: 20, optional: true, section_id: advanced, mode: advanced}
- {name: cellprob_threshold, type: float, label: Cellpose Probability Threshold, description: Cellpose cell probability threshold., default: 0.0, cli_tag: --cellprob-threshold, cli_order: 21, optional: true, section_id: advanced, mode: advanced}
- {name: flow_threshold, type: float, label: Cellpose Flow Threshold, description: Cellpose flow error threshold., default: 0.4, minimum: 0.0, cli_tag: --flow-threshold, cli_order: 22, optional: true, section_id: advanced, mode: advanced}
- {name: stardist_prob_threshold, type: float, label: StarDist Probability Threshold, description: Object probability threshold. Use -1 to read the model-specific prob value from thresholds.json., default: -1.0, cli_tag: --stardist-prob-threshold, cli_order: 23, optional: true, section_id: advanced, mode: advanced}
- {name: stardist_nms_threshold, type: float, label: StarDist NMS Threshold, description: Non-maximum-suppression overlap threshold. Use -1 to read the model-specific nms value from thresholds.json., default: -1.0, cli_tag: --stardist-nms-threshold, cli_order: 24, optional: true, section_id: advanced, mode: advanced}
- {name: smooth_stardist_labels, type: checkbox, label: Smooth Rescaled StarDist Labels, description: Rasterize StarDist polygons directly on the source pixel grid after model-scale inference. Disable to restore the low-resolution integer label map with nearest-neighbor resizing., default: true, cli_tag: --smooth-stardist-labels, cli_order: 25, optional: true, append_value: true, section_id: advanced, mode: advanced}
- {name: spotiflow_prob_threshold, type: float, label: Spotiflow Probability Threshold, description: Use -1 for checkpoint default., default: -1.0, cli_tag: --spotiflow-prob-threshold, cli_order: 26, optional: true, section_id: advanced, mode: advanced}
- {name: spotiflow_min_distance, type: float, label: Spotiflow Minimum Distance (µm), description: Minimum detected-point separation in µm, converted using OME-Zarr XY pixel size., default: 1.0, minimum: 0.0, cli_tag: --spotiflow-min-distance, cli_order: 27, optional: true, section_id: advanced, mode: advanced}
- {name: spotiflow_local_refinement, type: checkbox, label: Spotiflow Local Mask Refinement, description: Grow each Spotiflow point into a bounded mask using local signal and background. Supports 2D and forced slice-wise 2D., default: false, cli_tag: --spotiflow-local-refinement, cli_order: 28, optional: true, append_value: true, section_id: advanced, mode: advanced}
- name: measurements_database
  type: string
  label: Create Measurements Database
  description: Write object shape, location, per-channel intensity, and overlap relationships to one database per input image or HCS screen.
  default: duckdb
  options:
  - {label: DuckDB, value: duckdb}
  - {label: SQLite, value: sqlite}
  - {label: Skip, value: skip}
  multiselect: false
  cli_tag: --measurements-database
  cli_order: 29
  optional: true
  section_id: advanced
  mode: advanced
- {name: benchmark, type: checkbox, label: Benchmark Gallery, description: Benchmark every model offered for each enabled segmentation step on first T and a centered maximum 1024x1024 ROI; write one rendered 2D XY RGB OME-Zarr gallery., default: false, cli_tag: --benchmark, cli_order: 44, optional: true, append_value: true, section_id: advanced, mode: advanced}
